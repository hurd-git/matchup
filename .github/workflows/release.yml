name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: Publish the built wheels to PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-windows-wheels:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install wheel builder
        run: python -m pip install cibuildwheel==4.1.0
      - uses: actions/cache@v4
        with:
          path: .build
          key: matchup-release-opencv-4.12.0-${{ hashFiles('CMakeLists.txt') }}
      - name: Build and test Windows wheels
        run: python -m cibuildwheel --platform windows --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: windows-wheels
          path: wheelhouse/*.whl

  github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-windows-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-wheels
          path: wheelhouse
      - uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
          generate_release_notes: true

  publish-pypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi
    needs: build-windows-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-wheels
          path: wheelhouse
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse
