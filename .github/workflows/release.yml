name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: Publish an existing GitHub Release to PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-windows-wheels:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install wheel builder
        run: python -m pip install cibuildwheel==4.1.0 twine==6.1.0
      - uses: actions/cache@v4
        with:
          path: .build
          key: matchup-release-opencv-4.12.0-${{ hashFiles('CMakeLists.txt') }}
      - name: Build and test Windows wheels
        run: python -m cibuildwheel --platform windows --output-dir wheelhouse
      - name: Check wheel metadata
        run: python -m twine check wheelhouse/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: windows-wheels
          path: wheelhouse/*.whl

  build-sdist:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source builder
        run: python -m pip install build==1.3.0 twine==6.1.0
      - name: Build source distribution
        run: python -m build --sdist --outdir dist
      - name: Check source metadata
        run: python -m twine check dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: source-distribution
          path: dist/*.tar.gz

  github-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-wheels
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/matchup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install metadata checker
        run: python -m pip install twine==6.1.0
      - name: Resolve release from package version
        id: release
        shell: bash
        run: |
          version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          mkdir -p dist
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --pattern "matchup-*.whl" \
            --pattern "matchup-*.tar.gz"
      - name: Verify release asset set
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v") or len(tag) == 1:
              raise SystemExit(f"Release tag must have the form v<version>: {tag!r}")

          version = tag[1:]
          expected = {
              f"matchup-{version}-cp{minor}-cp{minor}-win_amd64.whl"
              for minor in range(310, 315)
          }
          expected.add(f"matchup-{version}.tar.gz")
          actual = {path.name for path in Path("dist").iterdir() if path.is_file()}
          if actual != expected:
              missing = sorted(expected - actual)
              unexpected = sorted(actual - expected)
              raise SystemExit(
                  f"Release asset mismatch; missing={missing}, unexpected={unexpected}"
              )

          print("Verified release assets:")
          for name in sorted(actual):
              print(f"  {name}")
          PY
      - name: Check release metadata
        run: python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
