name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-wheel:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/cache@v4
        with:
          path: .build
          key: matchup-opencv-4.12.0-cp312-${{ hashFiles('CMakeLists.txt') }}
      - name: Install development tools
        run: uv sync --no-install-project --group dev
      - name: Build wheel
        run: uv build --wheel
      - name: Install wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist\matchup-*.whl | Select-Object -First 1
          uv pip install --python .venv\Scripts\python.exe --force-reinstall $wheel.FullName
      - name: Test installed wheel
        run: .venv\Scripts\python.exe -m pytest tests
      - name: Check wheel metadata
        run: .venv\Scripts\python.exe -m twine check dist\*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: matchup-cp312-win-amd64
          path: dist/*.whl
